services:
  backend:
    build:
      context: ./backend
    container_name: office-leasing-backend
    environment:
      DATABASE_URL: sqlite:////app/data/office_leasing.db
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: office-leasing-frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000/api
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
